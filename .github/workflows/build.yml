name: Build MAWI AI APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Prepare Project
      run: |
        unzip -o MAWI_AI_Complete.zip
        mv MAWI_AI/* .
        chmod +x gradlew

    - name: Add API Key
      run: sed -i 's/YOUR_GEMINI_API_KEY_HERE/${{ secrets.GEMINI_API_KEY }}/g' app/src/main/java/com/mawi/ai/VoiceCommandService.kt

    - name: Build APK
      run: ./gradlew assembleDebug

    - uses: actions/upload-artifact@v4
      with:
        name: MAWI-AI-APK
        path: app/build/outputs/apk/debug/app-debug.apk
